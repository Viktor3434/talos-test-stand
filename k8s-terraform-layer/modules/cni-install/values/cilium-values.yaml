kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

# IPAM режим
ipam:
  mode: kubernetes


# Каталог cgroup
cgroup:
  hostRoot: /sys/fs/cgroup

# SecurityContext capabilities
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE